name: Publish TypeScript SDK

# Publishes typescript/ to npm when a tag like `ts-v0.1.0` is pushed.
# Requires an NPM_TOKEN repo secret and the @hostpay org (see PUBLISHING.md).
# Publishes with provenance.

on:
  push:
    tags: ["ts-v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#ts-v}"
          echo "package=$PKG tag=$TAG"
          [ "$PKG" = "$TAG" ] || { echo "::error::package.json version ($PKG) != tag ($TAG)"; exit 1; }

      - run: npm ci
      - run: npm test

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
