name: Publish Python SDK

# Publishes python/ to PyPI when a tag like `python-v0.1.0` is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API token. Configure a trusted
# publisher on PyPI first (see PUBLISHING.md).

on:
  push:
    tags: ["python-v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${GITHUB_REF_NAME#python-v}"
          echo "package=$PKG tag=$TAG"
          [ "$PKG" = "$TAG" ] || { echo "::error::pyproject version ($PKG) != tag ($TAG)"; exit 1; }

      - name: Install and test
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[dev]"
          pytest -q

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
